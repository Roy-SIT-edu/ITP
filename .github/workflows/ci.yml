name: Quality Gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    defaults:
      run:
        working-directory: "ITP Programming App 2/timetable-app/backend"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "ITP Programming App 2/timetable-app/backend/requirements-dev.txt"
      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Backend tests
        run: pytest -q
      - name: Dependency consistency
        run: python -m pip check

  frontend:
    name: Frontend (Node 20.19)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "ITP Programming App 2/timetable-app/frontend"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: "ITP Programming App 2/timetable-app/frontend/package-lock.json"
      - run: npm ci
      - run: npm run format:check
      - run: npm run test:run
      - run: npm run lint
      - run: npm run build
      - run: npm audit --audit-level=high

  windows-launcher:
    name: Windows launcher smoke test
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: "ITP Programming App 2/timetable-app"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: "ITP Programming App 2/timetable-app/frontend/package-lock.json"
      - name: Cold start, repeat start, fallback ports, health, and scoped shutdown
        shell: pwsh
        run: ./scripts/windows-launcher-smoke.ps1
